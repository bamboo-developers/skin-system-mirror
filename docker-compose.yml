services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: skin-system
    volumes:
      - .:/skin-system
      - ./logs/nginx:/var/log/nginx
    ports:
      - "5050:5050"
    environment:
      - PYTHONUNBUFFERED=1
      - SKIN_SYSTEM_NAME=skin-system
      - SIGN_API_TOKEN=TO_CREATE_TOKEN_->_https://mineskin.org/apikey
      - TOKEN_SYSTEM=1
    restart: unless-stopped
